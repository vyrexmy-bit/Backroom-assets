<script>
/* ── Minimal GLB Loader for Three.js r128 ──
   Parses binary GLB (glTF 2.0) via fetch + FileReader approach.
   Handles meshes, materials, textures, node hierarchy.
   Attaches as THREE.GLTFLoader so existing code works unchanged.
*/
(function(){
'use strict';

var BINARY_EXTENSION_HEADER_MAGIC = 'glTF';
var BINARY_EXTENSION_HEADER_LENGTH = 12;
var BINARY_EXTENSION_CHUNK_TYPES = { JSON: 0x4E4F534A, BIN: 0x004E4942 };

function GLTFLoader(manager){
  this.manager = manager || THREE.DefaultLoadingManager;
}

GLTFLoader.prototype = {
  constructor: GLTFLoader,

  load: function(url, onLoad, onProgress, onError){
    var scope = this;
    fetch(url)
      .then(function(response){
        if(!response.ok) throw new Error('HTTP ' + response.status + ': ' + url);
        return response.arrayBuffer();
      })
      .then(function(data){ scope.parse(data, url, onLoad, onError); })
      .catch(function(err){
        console.error('GLB fetch failed:', url, err);
        onError && onError(err);
      });
  },

  parse: function(data, path, onLoad, onError){
    try {
      var content = '';
      var binChunk = null;

      // Read GLB header
      var header = new Uint32Array(data, 0, 3);
      var magic = THREE.LoaderUtils.decodeText(new Uint8Array(data, 0, 4));
      if(magic !== BINARY_EXTENSION_HEADER_MAGIC){
        onError && onError(new Error('Unsupported format: '+magic)); return;
      }

      // Parse chunks
      var chunkView = new DataView(data, BINARY_EXTENSION_HEADER_LENGTH);
      var chunkIndex = 0;
      while(chunkIndex < chunkView.byteLength){
        var chunkLength = chunkView.getUint32(chunkIndex, true); chunkIndex += 4;
        var chunkType   = chunkView.getUint32(chunkIndex, true); chunkIndex += 4;
        if(chunkType === BINARY_EXTENSION_CHUNK_TYPES.JSON){
          var contentArray = new Uint8Array(data, BINARY_EXTENSION_HEADER_LENGTH + chunkIndex, chunkLength);
          content = THREE.LoaderUtils.decodeText(contentArray);
        } else if(chunkType === BINARY_EXTENSION_CHUNK_TYPES.BIN){
          var byteOffset = BINARY_EXTENSION_HEADER_LENGTH + chunkIndex;
          binChunk = data.slice(byteOffset, byteOffset + chunkLength);
        }
        chunkIndex += chunkLength;
      }

      var json = JSON.parse(content);
      this._parseFull(json, binChunk, path, onLoad, onError);

    } catch(e) {
      onError && onError(e);
    }
  },

  _parseFull: function(json, binBuffer, path, onLoad, onError){
    try {
      var scope = this;
      var scene = new THREE.Group();
      var bufferViews = json.bufferViews || [];
      var accessors   = json.accessors   || [];
      var meshes      = json.meshes      || [];
      var nodes       = json.nodes       || [];
      var mats        = json.materials   || [];
      var textures    = json.textures    || [];
      var images      = json.images      || [];

      // ── Accessors ──
      function getAccessorData(idx){
        if(idx === undefined || idx === null) return null;
        var acc = accessors[idx];
        var bv  = bufferViews[acc.bufferViewIndex !== undefined ? acc.bufferViewIndex : acc.bufferView];
        var buf = binBuffer;
        var byteOffset = (bv.byteOffset||0) + (acc.byteOffset||0);
        var count = acc.count;
        var typeMap = {SCALAR:1,VEC2:2,VEC3:3,VEC4:4,MAT4:16};
        var numComp = typeMap[acc.type] || 1;
        var TypedArr;
        switch(acc.componentType){
          case 5126: TypedArr = Float32Array; break;
          case 5123: TypedArr = Uint16Array;  break;
          case 5125: TypedArr = Uint32Array;  break;
          case 5121: TypedArr = Uint8Array;   break;
          default:   TypedArr = Float32Array;
        }
        return new TypedArr(buf, byteOffset, count * numComp);
      }

      // ── Materials ──
      function buildMat(mi){
        if(mi === undefined || mi === null || !mats[mi]){
          return new THREE.MeshStandardMaterial({color:0x888888,roughness:0.8,metalness:0.1});
        }
        var gm = mats[mi];
        var pbr = gm.pbrMetallicRoughness || {};
        var color = 0xcccccc;
        if(pbr.baseColorFactor){
          var f = pbr.baseColorFactor;
          color = new THREE.Color(f[0],f[1],f[2]);
        }
        return new THREE.MeshStandardMaterial({
          color: color,
          roughness: pbr.roughnessFactor !== undefined ? pbr.roughnessFactor : 0.8,
          metalness: pbr.metallicFactor  !== undefined ? pbr.metallicFactor  : 0.1,
          side: gm.doubleSided ? THREE.DoubleSide : THREE.FrontSide
        });
      }

      // ── Mesh builder ──
      function buildMesh(mi){
        var mesh3 = json.meshes[mi];
        var group = new THREE.Group();
        group.name = mesh3.name || ('mesh_'+mi);
        mesh3.primitives.forEach(function(prim){
          var geo = new THREE.BufferGeometry();
          var attrs = prim.attributes || {};
          if(attrs.POSITION !== undefined){
            var pos = getAccessorData(attrs.POSITION);
            geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(pos), 3));
          }
          if(attrs.NORMAL !== undefined){
            var nor = getAccessorData(attrs.NORMAL);
            geo.setAttribute('normal', new THREE.BufferAttribute(new Float32Array(nor), 3));
          }
          if(attrs.TEXCOORD_0 !== undefined){
            var uv = getAccessorData(attrs.TEXCOORD_0);
            geo.setAttribute('uv', new THREE.BufferAttribute(new Float32Array(uv), 2));
          }
          if(prim.indices !== undefined){
            var idx = getAccessorData(prim.indices);
            geo.setIndex(new THREE.BufferAttribute(new Uint32Array(idx), 1));
          }
          if(!geo.attributes.normal) geo.computeVertexNormals();
          var mat = buildMat(prim.material);
          var mesh = new THREE.Mesh(geo, mat);
          mesh.castShadow = true;
          mesh.receiveShadow = true;
          group.add(mesh);
        });
        return group;
      }

      // ── Node tree ──
      function buildNode(ni){
        var nd = nodes[ni];
        var obj = new THREE.Group();
        obj.name = nd.name || ('node_'+ni);
        if(nd.matrix){
          obj.matrix.set.apply(obj.matrix, nd.matrix);
          obj.matrix.decompose(obj.position, obj.quaternion, obj.scale);
        } else {
          if(nd.translation) obj.position.set(nd.translation[0],nd.translation[1],nd.translation[2]);
          if(nd.rotation)    obj.quaternion.set(nd.rotation[0],nd.rotation[1],nd.rotation[2],nd.rotation[3]);
          if(nd.scale)       obj.scale.set(nd.scale[0],nd.scale[1],nd.scale[2]);
        }
        if(nd.mesh !== undefined) obj.add(buildMesh(nd.mesh));
        (nd.children||[]).forEach(function(ci){ obj.add(buildNode(ci)); });
        return obj;
      }

      // ── Scenes ──
      var sceneIdx = json.scene !== undefined ? json.scene : 0;
      var gltfScene = json.scenes[sceneIdx];
      (gltfScene.nodes||[]).forEach(function(ni){ scene.add(buildNode(ni)); });

      onLoad({ scene: scene, scenes:[scene], animations:[], asset: json.asset||{} });

    } catch(e){
      onError && onError(e);
    }
  }
};

THREE.GLTFLoader = GLTFLoader;
})();
</script>
<script>
'use strict';

/* VIDEO — one element per tape (BLACK=0, WHITE=1, GREY=2) */
// vid0 = original tape (was default), vid1 = BLACK tape, vid2 = WHITE (TBD), vid3 = GREY (TBD)
// Tape index mapping: BLACK→vid1, WHITE→vid2, GREY→vid3
const TAPE_VIDS = [
  document.getElementById('vid1'), // BLACK tape
  document.getElementById('vid2'), // WHITE tape (no src yet)
  document.getElementById('vid3'), // GREY tape (no src yet)
];
const vidReady=[false,false,false];
TAPE_VIDS.forEach((v,i)=>{ if(v) v.addEventListener('canplay',()=>vidReady[i]=true); });

// Active video — whichever tape is in the deck
let activeVid=null;
let activeVidIdx=-1;

const vc=document.getElementById('vc'),vx=vc.getContext('2d');

function paintFrame(){
  const v=activeVid;
  const rdy=activeVidIdx>=0?vidReady[activeVidIdx]:false;
  if(v&&rdy&&v.readyState>=2){vx.drawImage(v,0,0,vc.width,vc.height);}
  else{
    // static noise
    const id=vx.createImageData(vc.width,vc.height);
    for(let i=0;i<id.data.length;i+=4){const n=Math.random()*30;id.data[i]=id.data[i+1]=id.data[i+2]=n;id.data[i+3]=255;}
    vx.putImageData(id,0,0);
  }
}

/* RENDERER */
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,1.5));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.NoToneMapping;
renderer.toneMappingExposure=1.0;
document.getElementById('app').appendChild(renderer.domElement);

/* ── BLOOM — CSS blur overlay composited on top ──
   We render the scene normally, then draw the renderer canvas onto a
   second hidden canvas, apply a CSS blur filter, and composite it on
   top with screen blend. This gives a convincing bloom without needing
   post-processing passes.
*/
const bloomCanvas=document.createElement('canvas');
bloomCanvas.style.cssText=`
  position:fixed;inset:0;width:100%;height:100%;
  pointer-events:none;z-index:5;
  mix-blend-mode:screen;
  opacity:0.38;
`;
document.getElementById('app').appendChild(bloomCanvas);
const bx=bloomCanvas.getContext('2d');

function resizeBloom(){
  bloomCanvas.width=innerWidth;
  bloomCanvas.height=innerHeight;
}
resizeBloom();
window.addEventListener('resize',resizeBloom);

// Bloom — only bright highlights bleed through screen blend (dark areas = black = no contribution)
function paintBloom(){
  bx.clearRect(0,0,bloomCanvas.width,bloomCanvas.height);
  bx.filter='blur(22px) brightness(1.6) contrast(1.2)';
  bx.drawImage(renderer.domElement,0,0,bloomCanvas.width,bloomCanvas.height);
  bx.filter='none';
}

const scene=new THREE.Scene();

const camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,100);
camera.position.set(0,1.7,4.2);

function smat(color,roughness=0.8,metalness=0.05,opts={}){return new THREE.MeshStandardMaterial({color,roughness,metalness,...opts});}

/* ═══════════════════════════════════
   ENVIRONMENT — Level 0 (exact copy)
═══════════════════════════════════ */

// Scene fog + background — exact from Level 0
scene.fog = new THREE.FogExp2(0x1a1a00, 0.04);
scene.background = new THREE.Color(0x1a1a00);

// Room dimensions — smaller feel
const size   = 10;
const height = 4.2;
// Alias so rack/TV placement code still works
const RW=size, RH=height, RD=size;

// ── Wall texture — exact drawChevron + exact parameters ──
function drawChevron(ctx, cx, cy, width, h2, thickness, direction) {
  ctx.beginPath();
  const halfW = width / 2;
  if (direction === 'UP') {
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + halfW, cy + h2);
    ctx.lineTo(cx + halfW, cy + h2 + thickness);
    ctx.lineTo(cx, cy + thickness);
    ctx.lineTo(cx - halfW, cy + h2 + thickness);
    ctx.lineTo(cx - halfW, cy + h2);
  } else {
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + halfW, cy - h2);
    ctx.lineTo(cx + halfW, cy - h2 - thickness);
    ctx.lineTo(cx, cy - thickness);
    ctx.lineTo(cx - halfW, cy - h2 - thickness);
    ctx.lineTo(cx - halfW, cy - h2);
  }
  ctx.closePath();
  ctx.fill();
}

function createWallTexture() {
  const canvas = document.createElement('canvas');
  canvas.width = 1024; canvas.height = 1024;
  const ctx = canvas.getContext('2d');
  // Exact Level 0 original colors
  ctx.fillStyle = '#D0D18D'; ctx.fillRect(0, 0, 1024, 1024);
  ctx.fillStyle = '#B0B361';
  const lineWidth = 32;
  ctx.fillRect(0,   0, lineWidth, 1024);
  ctx.fillRect(640, 0, lineWidth, 1024);
  const wideCenter = 336, narrowCenter = 848;
  for (let y = -512; y <= 1024; y += 512) {
    drawChevron(ctx, wideCenter, y + 60,  400, 200, 80, 'UP');
    drawChevron(ctx, wideCenter, y + 180, 400, 200, 80, 'UP');
  }
  for (let y = -256; y <= 1024; y += 256) {
    drawChevron(ctx, narrowCenter, y + 120, 160, 80, 32, 'DOWN');
    drawChevron(ctx, narrowCenter, y + 176, 160, 80, 32, 'DOWN');
  }
  // Exact Level 0 grain: noise 12, verticalGrain 8
  const imgData = ctx.getImageData(0, 0, 1024, 1024);
  const data = imgData.data;
  for (let i = 0; i < data.length; i += 4) {
    const noise = (Math.random() - 0.5) * 12;
    const vg    = (Math.random() - 0.5) * 8;
    data[i]   = Math.min(255, Math.max(0, data[i]   + noise + vg));
    data[i+1] = Math.min(255, Math.max(0, data[i+1] + noise + vg));
    data[i+2] = Math.min(255, Math.max(0, data[i+2] + noise + vg));
  }
  ctx.putImageData(imgData, 0, 0);
  const t = new THREE.CanvasTexture(canvas);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  return t;
}

// ── Carpet texture — exact ──
function createCarpetTexture() {
  const canvas = document.createElement('canvas');
  const s = 512; canvas.width = canvas.height = s;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#1e1c0d'; ctx.fillRect(0, 0, s, s);
  const drawLoops = (count, color, thickness, rMin, rMax) => {
    ctx.strokeStyle = color; ctx.lineWidth = thickness;
    for (let i = 0; i < count; i++) {
      const x = Math.random()*s, y = Math.random()*s;
      const r = Math.random()*(rMax-rMin)+rMin;
      const sa = Math.random()*Math.PI*2;
      const ea = sa + Math.PI*(0.5+Math.random());
      ctx.beginPath(); ctx.arc(x,y,r,sa,ea); ctx.stroke();
    }
  };
  drawLoops(20000,'#3a381a',3.0,3,6);
  drawLoops(15000,'#565421',2.0,2,5);
  drawLoops(10000,'#75722c',1.5,1,4);
  const imgData = ctx.getImageData(0,0,s,s); const data=imgData.data;
  for(let i=0;i<data.length;i+=4){const n=(Math.random()-.5)*20;data[i]=Math.min(255,Math.max(0,data[i]+n));data[i+1]=Math.min(255,Math.max(0,data[i+1]+n));data[i+2]=Math.min(255,Math.max(0,data[i+2]+n));}
  ctx.putImageData(imgData,0,0);
  const t=new THREE.CanvasTexture(canvas);t.wrapS=t.wrapT=THREE.RepeatWrapping;return t;
}

// ── Ceiling texture — 2×2 grid per tile so each cell ≈ lamp size ──
function createCeilingTexture() {
  const canvas=document.createElement('canvas');
  // 512px canvas, 2×2 grid inside = each cell is 256px = 1 world tile
  const s=512, gridCells=2;
  canvas.width=canvas.height=s;
  const ctx=canvas.getContext('2d');

  // Base colour — slightly darker than walls for visual separation
  ctx.fillStyle='#C8C5A0';ctx.fillRect(0,0,s,s);

  // Subtle surface texture noise — aged acoustic tile feel
  for(let i=0;i<35000;i++){
    ctx.fillStyle=Math.random()>.55?'rgba(200,197,155,0.06)':'rgba(0,0,0,0.04)';
    ctx.fillRect(Math.random()*s,Math.random()*s,Math.random()*8,Math.random()*8);
  }
  // Fine grain
  for(let i=0;i<8000;i++){
    ctx.fillStyle=`rgba(0,0,0,${Math.random()*0.06})`;
    ctx.fillRect(Math.random()*s,Math.random()*s,2,2);
  }

  // Grid lines — thick shadow line + thin highlight = 3D recessed edge
  const step=s/gridCells;
  for(let i=0;i<=gridCells;i++){
    // highlight (top-left of groove)
    ctx.strokeStyle='rgba(255,255,255,0.55)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(i*step+1.5,0);ctx.lineTo(i*step+1.5,s);
    ctx.moveTo(0,i*step+1.5);ctx.lineTo(s,i*step+1.5);ctx.stroke();
    // shadow (bottom-right of groove)
    ctx.strokeStyle='rgba(0,0,0,0.55)';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(i*step-1,0);ctx.lineTo(i*step-1,s);
    ctx.moveTo(0,i*step-1);ctx.lineTo(s,i*step-1);ctx.stroke();
  }

  const t=new THREE.CanvasTexture(canvas);t.wrapS=t.wrapT=THREE.RepeatWrapping;return t;
}

// ── UV tile constants ──
const WALL_TW = size / 24;   // 20/24 ≈ 0.833m per tile
const WALL_TH = height / 12; // 10/12 ≈ 0.833m per tile
const FLOOR_T = size / 12;   // carpet tile size — original tiling
// CEIL_T = 1.0m per tile so each ceiling grid cell = lamp panel (1.0×1.0m)
// room is 10m → repeat(10,10) → 10×10 ceiling tiles, lamp = 1 tile
const CEIL_T  = 1.0;

function uvWallMat(tex, worldW, worldH) {
  const tc=tex.clone();tc.wrapS=tc.wrapT=THREE.RepeatWrapping;
  tc.repeat.set(worldW/WALL_TW, worldH/WALL_TH);tc.needsUpdate=true;
  return new THREE.MeshStandardMaterial({map:tc,bumpMap:tc,bumpScale:0.022,roughness:0.98,metalness:0.0});
}
function uvFloorMat(tex, worldW, worldH) {
  const tc=tex.clone();tc.wrapS=tc.wrapT=THREE.RepeatWrapping;
  tc.repeat.set(worldW/FLOOR_T, worldH/FLOOR_T);tc.needsUpdate=true;
  return new THREE.MeshStandardMaterial({map:tc,bumpMap:tc,bumpScale:0.12,roughness:1.0,metalness:0});
}
function uvCeilMat(tex, worldW, worldH) {
  const tc=tex.clone();tc.wrapS=tc.wrapT=THREE.RepeatWrapping;
  tc.repeat.set(worldW/CEIL_T, worldH/CEIL_T);tc.needsUpdate=true;
  return new THREE.MeshStandardMaterial({map:tc,bumpMap:tc,bumpScale:0.06,roughness:1.0,metalness:0});

/* ═══════════════════════════════════════════════════════════
   SHARED LOADER — tries primary URL, falls back to proxy
═══════════════════════════════════════════════════════════ */
const gltfLoader = new THREE.GLTFLoader();

function fetchGLB(url) {
  return fetch(url).then(function(r){
    if(!r.ok) throw new Error('HTTP '+r.status);
    return r.arrayBuffer();
  });
}

function loadGLB(primaryUrl, fallbackUrl, onLoad, onError) {
  var scope = gltfLoader;
  fetchGLB(primaryUrl)
    .catch(function(e){
      console.warn('Primary failed ('+primaryUrl+'), trying proxy...');
      return fetchGLB(fallbackUrl);
    })
    .then(function(data){
      scope.parse(data, primaryUrl, onLoad, function(e){
        console.error('GLB parse failed:', e);
        onError && onError(e);
      });
    })
    .catch(function(err){
      console.error('GLB load failed completely:', primaryUrl, err);
      showModelError(primaryUrl.split('/').pop().replace('.glb',''));
      onError && onError(err);
    });
}

// Show a visible on-screen error
function showModelError(name) {
  var el = document.createElement('div');
  el.style.cssText = 'position:fixed;top:8px;left:50%;transform:translateX(-50%);background:rgba(180,20,20,0.92);color:#fff;font:11px monospace;padding:6px 16px;border-radius:3px;z-index:999;letter-spacing:1px';
  el.textContent = name.toUpperCase() + ' GLB FAILED — check console';
  document.body.appendChild(el);

}

/* ═══════════════════════════════════════════════════════════
   SCREEN SHADER — kept exactly from original
   Returns {crtMat, cTex, gwMat, tvGlow, ledMat}
   Applied to a plane placed on the loaded TV model
═══════════════════════════════════════════════════════════ */
function buildScreenSystem(parent, S) {
  // S = world scale factor so SpotLight positions match
  const cTex = new THREE.CanvasTexture(vc);
  cTex.minFilter = THREE.LinearFilter;
  cTex.magFilter = THREE.LinearFilter;
  cTex.anisotropy = renderer.capabilities.getMaxAnisotropy();

  const crtMat = new THREE.ShaderMaterial({
    uniforms: {map:{value:cTex}, time:{value:0}, power:{value:0}, warmup:{value:0}},
    vertexShader: `varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
    fragmentShader: `
      uniform sampler2D map;uniform float time,power,warmup;varying vec2 vUv;
      vec2 barrel(vec2 u){u=u*2.-1.;u+=u*dot(u,u)*vec2(.065,.085);return u*.5+.5;}
      float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.545);}
      void main(){
        if(power<.01){gl_FragColor=vec4(0.0,0.0,0.0,1.0);return;}
        vec2 c=barrel(vUv);
        float edge=float(c.x>0.&&c.x<1.&&c.y>0.&&c.y<1.);
        c.x+=sin(c.y*185.+time*1.9)*.0004+sin(time*3.4)*.00018;
        float roll=fract(time*.075);c.x+=step(abs(fract(c.y-roll)-.5),.0022)*.038;
        float ca=.002+sin(time*.38)*.0005;
        vec3 col=vec3(texture2D(map,c+vec2(ca,0.)).r,texture2D(map,c).g,texture2D(map,c-vec2(ca,0.)).b);
        col*=mix(1.,.5+.5*sin(c.y*640.),.15);
        col*=1.-dot(c-.5,c-.5)*1.25;
        col=mix(col,col*vec3(.88,1.02,1.13),.2);
        col+=(hash(c+time*.04)-.5)*.028;
        col*=edge;col+=col*col*.08;col*=warmup*1.06;
        gl_FragColor=vec4(clamp(col,0.,1.),1.);
      }
    `
  });

  // Screen plane — sized to fit CRT face, will be auto-positioned after model loads
  const scrW = 0.38, scrH = 0.30; // world metres, tuned after scale
  const sg = new THREE.PlaneGeometry(scrW, scrH, 28, 22);
  const pa = sg.attributes.position;
  for(let i = 0; i < pa.count; i++){
    const x = pa.getX(i), y = pa.getY(i);
    pa.setZ(i, (x*x/0.06 + y*y/0.04) * 0.006);
  }
  sg.computeVertexNormals();
  const scrMesh = new THREE.Mesh(sg, crtMat);
  scrMesh.userData.noHighlight = true;
  // Position set after model loads via positionScreen()
  parent.add(scrMesh);

  // Glass sheen over screen
  const glassMat = new THREE.MeshStandardMaterial({
    color:0x10101a, roughness:0.02, metalness:0.15, transparent:true, opacity:0.10
  });
  const glassOverlay = new THREE.Mesh(new THREE.PlaneGeometry(scrW, scrH), glassMat);
  glassOverlay.userData.noHighlight = true;
  parent.add(glassOverlay);

  // Glow plane
  const gwMat = new THREE.MeshBasicMaterial({color:0x88aaee, transparent:true, opacity:0});
  const glowMesh = new THREE.Mesh(new THREE.PlaneGeometry(scrW*0.96, scrH*0.96), gwMat);
  glowMesh.userData.noHighlight = true;
  parent.add(glowMesh);

  // SpotLight from screen face — positioned after model loads
  const tvGlow = new THREE.SpotLight(0x88ccff, 0, 5.5, Math.PI*0.28, 0.45, 1.2);
  const tvGlowTarget = new THREE.Object3D();
  parent.add(tvGlowTarget);
  tvGlow.target = tvGlowTarget;
  parent.add(tvGlow);

  // Fake LED mat (returned for power animation)
  const ledMat = new THREE.MeshStandardMaterial({
    color:0x111, roughness:.3, metalness:.5, emissive:0x000000, emissiveIntensity:0
  });

  return {
    crtMat, cTex, gwMat, tvGlow, ledMat,
    scrMesh, glassOverlay, glowMesh, tvGlowTarget,
    positionScreen: function(frontZ, centerX, centerY) {
      // Called once model BBox is known — place screen on TV front face
      scrMesh.position.set(centerX, centerY, frontZ + 0.002);
      glassOverlay.position.set(centerX, centerY, frontZ + 0.005);
      glowMesh.position.set(centerX, centerY, frontZ - 0.004);
      tvGlow.position.set(centerX, centerY, frontZ + 0.08);
      tvGlowTarget.position.set(centerX, centerY, frontZ + 4.5);
    }
  };
}

// Compute bbox from raw geometry — no world matrix needed
function geoBBox(model) {
  var box = new THREE.Box3();
  model.traverse(function(obj){
    if(obj.isMesh && obj.geometry){
      obj.geometry.computeBoundingBox();
      var gb = obj.geometry.boundingBox;
      if(gb) box.expandByPoint(gb.min).expandByPoint(gb.max);
    }
  });
  return box;
}

loadGLB(GLB_RACK, GLB_RACK_FB, function(model) {

  model.scale.setScalar(scaleR);

  var box2 = new THREE.Box3();
  box2.min.copy(box.min).multiplyScalar(scaleR);
  box2.max.copy(box.max).multiplyScalar(scaleR);
  var ctr = new THREE.Vector3(); box2.getCenter(ctr);
  model.position.set(-ctr.x, -box2.min.y, -ctr.z);

/* ── CABLES — Verlet soft-body, reanchors once models load ── */
const _cableSystems = [];

function buildCables() {
  const stZ  = -3.8;
  const S    = 1.0;

  // Port world positions — approximate until models load, then close enough
  // TV rear ports: TV is on shelf y≈1.239+, rack rear z≈stZ-0.52
  const tvPortY   = 1.55;
  const tvPortZ   = stZ - 0.50;
  const tvPortsX  = [-0.14, -0.08, -0.02, 0.06];

  // VHS rear ports: VHS on shelf y≈0.75, rear z≈stZ-0.38
  const vhsPortY  = 0.78;
  const vhsPortZ  = stZ - 0.38;
  const vhsPortsX = [-0.10, -0.04, 0.02, 0.08];

  const colors  = [0xbbbbbb, 0xaaaaaa, 0x1a1a1a, 0x111111];
  const SEGS    = 22;
  const GRAVITY = 0.0032;
  const ITERS   = 14;
  const DAMPING = 0.984;

  for(var i = 0; i < 4; i++) {
    var p0 = new THREE.Vector3(vhsPortsX[i], vhsPortY, vhsPortZ);
    var p3 = new THREE.Vector3(tvPortsX[i],  tvPortY,  tvPortZ);

    var nodes     = [];
    var prevNodes = [];
    var segLen    = p0.distanceTo(p3) * 1.30 / SEGS;

    for(var n = 0; n <= SEGS; n++) {
      var t   = n / SEGS;
      var pos = new THREE.Vector3().lerpVectors(p0, p3, t);
      pos.y  -= Math.sin(t * Math.PI) * 0.10;
      nodes.push(pos.clone());
      prevNodes.push(pos.clone());
    }

    var curve   = new THREE.CatmullRomCurve3(nodes.map(function(v){ return v.clone(); }));
    var tubeGeo = new THREE.TubeGeometry(curve, SEGS*2, 0.0055, 7, false);
    var tubeMat = new THREE.MeshStandardMaterial({color:colors[i], roughness:0.76, metalness:0.04});
    var tube    = new THREE.Mesh(tubeGeo, tubeMat);
    tube.castShadow    = true;
    tube.frustumCulled = false;
    scene.add(tube);

    // Plugs at endpoints
    var pGeo = new THREE.CylinderGeometry(0.011, 0.011, 0.028, 10);
    pGeo.rotateX(Math.PI/2);
    var pMat = new THREE.MeshStandardMaterial({color:0x141414, roughness:0.38, metalness:0.6});
    var plug0 = new THREE.Mesh(pGeo, pMat);
    plug0.position.copy(p0); plug0.position.z -= 0.016; scene.add(plug0);
    var plug1 = new THREE.Mesh(pGeo, pMat);
    plug1.position.copy(p3); plug1.position.z += 0.016; scene.add(plug1);

    // Strain reliefs
    var rGeo = new THREE.CylinderGeometry(0.008, 0.011, 0.014, 8);
    rGeo.rotateX(Math.PI/2);
    var rel0 = new THREE.Mesh(rGeo, tubeMat);
    rel0.position.copy(p0); rel0.position.z -= 0.028; scene.add(rel0);
    var rel1 = new THREE.Mesh(rGeo, tubeMat);
    rel1.position.copy(p3); rel1.position.z += 0.028; scene.add(rel1);

    _cableSystems.push({
      nodes:nodes, prev:prevNodes,
      segLen:segLen, p0:p0, p3:p3,
      tube:tube, curve:curve, segs:SEGS,
      gravity:GRAVITY, iters:ITERS, damping:DAMPING,
      plug0:plug0, plug1:plug1, rel0:rel0, rel1:rel1
    });
  }
}

buildCables();

function tickCables() {
  _cableSystems.forEach(function(cs) {
    var n = cs.nodes, p = cs.prev, N = cs.segs;

    for(var i = 1; i < N; i++) {
      var vx = (n[i].x - p[i].x) * cs.damping;
      var vy = (n[i].y - p[i].y) * cs.damping;
      var vz = (n[i].z - p[i].z) * cs.damping;
      p[i].copy(n[i]);
      n[i].x += vx;
      n[i].y += vy - cs.gravity;
      n[i].z += vz;
    }

    // Pin endpoints
    n[0].copy(cs.p0); p[0].copy(cs.p0);
    n[N].copy(cs.p3); p[N].copy(cs.p3);

    // Constraint iterations
    for(var it = 0; it < cs.iters; it++) {
      for(var i = 0; i < N; i++) {
        var dx = n[i+1].x - n[i].x;
        var dy = n[i+1].y - n[i].y;
        var dz = n[i+1].z - n[i].z;
        var dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
        if(dist < 0.0001) continue;
        var diff = (dist - cs.segLen) / dist * 0.5;
        var cx = dx * diff, cy = dy * diff, cz = dz * diff;
        if(i > 0)   { n[i].x += cx;   n[i].y += cy;   n[i].z += cz; }
        if(i < N-1) { n[i+1].x -= cx; n[i+1].y -= cy; n[i+1].z -= cz; }
      }
      n[0].copy(cs.p0); n[N].copy(cs.p3);
    }

    // Rebuild tube
    var pts = n.map(function(v){ return v.clone(); });
    cs.curve.points = pts;
    var newGeo = new THREE.TubeGeometry(cs.curve, N*2, 0.0055, 7, false);
    cs.tube.geometry.dispose();
    cs.tube.geometry = newGeo;

    // Keep plugs pinned to endpoints
    cs.plug0.position.copy(cs.p0); cs.plug0.position.z -= 0.016;
    cs.plug1.position.copy(cs.p3); cs.plug1.position.z += 0.016;
    cs.rel0.position.copy(cs.p0);  cs.rel0.position.z  -= 0.028;
    cs.rel1.position.copy(cs.p3);  cs.rel1.position.z  += 0.028;
  });
}

/* ── VHS TAPE (pickup item) ── */
function buildVHSTape(caseCol,labelCol,stripeCol){
  caseCol  = caseCol   === undefined ? 0x111111 : caseCol;
  labelCol = labelCol  === undefined ? 0xeeeedd : labelCol;
  stripeCol= stripeCol === undefined ? 0x223388 : stripeCol;
  const g=new THREE.Group();
  function sm(c,r,m){r=r===undefined?.84:r;m=m===undefined?.07:m;return new THREE.MeshStandardMaterial({color:c,roughness:r,metalness:m});}
  const mC=sm(caseCol),mL=sm(labelCol,.67,0);
  const mR=sm(0x2a2a2e,.58,.22),mH=sm(0x888895,.37,.63);
  const mW=new THREE.MeshStandardMaterial({color:0x223322,roughness:.08,transparent:true,opacity:.62});
  const body=new THREE.Mesh(new THREE.BoxGeometry(.28,.178,.043),mC);body.castShadow=true;g.add(body);
  [[-.128,.073],[-.128,-.073],[.128,.073],[.128,-.073]].forEach(function(p){
    const e=new THREE.Mesh(new THREE.CylinderGeometry(.0068,.0068,.043,8),mC);e.position.set(p[0],p[1],0);g.add(e);
  });
  const lb=new THREE.Mesh(new THREE.BoxGeometry(.218,.098,.001),mL);lb.position.set(0,.026,.0225);g.add(lb);
  const st=new THREE.Mesh(new THREE.BoxGeometry(.218,.015,.001),new THREE.MeshBasicMaterial({color:stripeCol}));st.position.set(0,.075,.023);g.add(st);
  const wn=new THREE.Mesh(new THREE.BoxGeometry(.196,.060,.003),mW);wn.position.set(0,-.040,.022);g.add(wn);
  [-.062,.062].forEach(function(rx){
    const rl=new THREE.Mesh(new THREE.CylinderGeometry(.031,.031,.027,16),mR);rl.rotation.x=Math.PI/2;rl.position.set(rx,-.040,.009);g.add(rl);
    const hb=new THREE.Mesh(new THREE.CylinderGeometry(.011,.011,.029,8),mH);hb.rotation.x=Math.PI/2;hb.position.set(rx,-.040,.009);g.add(hb);
    for(var s=0;s<5;s++){const sp=new THREE.Mesh(new THREE.BoxGeometry(.004,.025,.007),mR);sp.rotation.z=s*Math.PI/2.5;sp.position.set(rx,-.040,.009);g.add(sp);}
  });
  const nt=new THREE.Mesh(new THREE.BoxGeometry(.084,.017,.008),sm(0x090909,.99));nt.position.set(0,-.098,.019);g.add(nt);
  return g;
}

   HIGHLIGHT SYSTEM
   — Raycasts from camera centre
   — Closest intersected interactable gets a pulsing white overlay mesh
═══════════════════════════════════ */
const hlRaycaster=new THREE.Raycaster();
hlRaycaster.far=2.8;

// One shared highlight mesh (clone per target to avoid z-fight)
let hlTarget=null;   // the THREE.Group currently highlighted
let hlMeshes=[];     // overlay meshes added to scene
let hlT=0;           // time for pulse animation

// Interactable entries: { group, type:'tape'|'vhs'|'tv' }
// built after tapes + station are created — done below after TAPES map

function buildHighlightMeshes(group){
  hlMeshes.forEach(m=>scene.remove(m));
  hlMeshes=[];
  group.traverse(obj=>{
    if(!obj.isMesh)return;
    // Skip screen, glow planes, shader materials, or highly transparent meshes
    if(obj.userData.noHighlight)return;
    if(obj.material&&obj.material.isShaderMaterial)return;
    if(obj.material&&obj.material.transparent&&obj.material.opacity<0.4)return;
    const hlMat=new THREE.MeshBasicMaterial({
      color:0xffffff,transparent:true,opacity:0,
      depthTest:true,depthWrite:false,side:THREE.FrontSide
    });
    const hlM=new THREE.Mesh(obj.geometry,hlMat);
    hlM.renderOrder=999;
    hlM.userData.srcMesh=obj;
    hlMeshes.push(hlM);
    scene.add(hlM);
  });
}

function clearHighlight(){
  hlMeshes.forEach(m=>scene.remove(m));
  hlMeshes=[];
  hlTarget=null;
}

const _hlPos=new THREE.Vector3(),_hlQuat=new THREE.Quaternion(),_hlScale=new THREE.Vector3();
function updateHighlight(t){
  const pulse=0.15+0.13*Math.sin(t*2.8);
  hlMeshes.forEach(m=>{
    m.material.opacity=pulse;
    // sync world transform from source mesh every frame
    const src=m.userData.srcMesh;
    if(src&&src.parent){
      src.getWorldPosition(_hlPos);
      src.getWorldQuaternion(_hlQuat);
      src.getWorldScale(_hlScale);
      m.position.copy(_hlPos);
      m.quaternion.copy(_hlQuat);
      m.scale.copy(_hlScale).multiplyScalar(1.025);
    }
  });
}

/* ═══════════════════════════════════
   INTERACTION CHECK — raycasted
═══════════════════════════════════ */
const hintEl=document.getElementById('hint');
let nTapeIdx=-1,nVHS=false,nTV=false,nEject=false;

function checkInteract(){
  // ── Raycast for precise highlight ──
  hlRaycaster.setFromCamera({x:0,y:0},camera);

  // build flat list of meshes to test
  const candidates=[];
  // tapes on floor
  tapeObjs.forEach((t,i)=>{
    if(t.userData.pickedUp)return;
    t.traverse(o=>{if(o.isMesh)candidates.push({mesh:o,type:'tape',idx:i,group:t});});
  });
  // VHS player meshes
  vhsGroup.traverse(o=>{if(o.isMesh)candidates.push({mesh:o,type:'vhs',idx:-1,group:vhsGroup});});
  // TV meshes (tvGroup)
  tvGroup.traverse(o=>{if(o.isMesh)candidates.push({mesh:o,type:'tv',idx:-1,group:tvGroup});});

  const meshList=candidates.map(c=>c.mesh);
  const hits=hlRaycaster.intersectObjects(meshList,false);

  let newTarget=null, newType=null, newIdx=-1;
  if(hits.length>0){
    const hit=hits[0];
    const found=candidates.find(c=>c.mesh===hit.object);
    if(found){newTarget=found.group;newType=found.type;newIdx=found.idx;}
  }

  // ── Distance gates (keep as safety so you can't interact through walls) ──
  const tvWP=new THREE.Vector3();tvStation.getWorldPosition(tvWP);tvWP.y=1.7;
  const vhsWP=new THREE.Vector3(tvStation.position.x,tvStation.position.y+.824,tvStation.position.z);
  const distTV=camera.position.distanceTo(tvWP);
  const distVHS=camera.position.distanceTo(vhsWP);
  const heldTape=getHeldTape();

  nTV  = newType==='tv'  && distTV<3.2  && !inserting&&!ejecting;
  nVHS = newType==='vhs' && distVHS<3.0 && heldTape!==null&&!tapeInserted&&!inserting&&!ejecting;
  nEject = newType==='vhs' && distVHS<3.0 && tapeInserted&&!ejecting&&!inserting;
  nTapeIdx = (newType==='tape' && newIdx>=0) ? newIdx : -1;

  // Highlight the aimed target
  if(newTarget!==hlTarget){
    clearHighlight();
    if(newTarget&&(nTV||nVHS||nEject||(nTapeIdx>=0))){
      hlTarget=newTarget;
      buildHighlightMeshes(newTarget);
    }
  } else if(!nTV&&!nVHS&&!nEject&&nTapeIdx<0){
    clearHighlight();
  }

  // ── Hint text ──
  let msgs=[];
  if(nTapeIdx>=0)      msgs.push('[E] Pick up '+tapeObjs[nTapeIdx].userData.name+' Tape');
  else if(nVHS)        msgs.push('[E] Insert Tape');
  else if(nTV)         msgs.push('[E] Toggle TV');
  if(nEject)           msgs.push('[Q] Eject Tape');
  else if(heldTape)    msgs.push('[Q] Drop Tape');

  if(msgs.length){hintEl.textContent=msgs.join('  ·  ');hintEl.classList.add('show');}
  else{hintEl.classList.remove('show');}
}

/* INSERT ANIMATION */
let inserting=false,insertT=0,insertVis=null;
const iStart=new THREE.Vector3(),iEnd=new THREE.Vector3();

function startInsert(){
  const heldTape=getHeldTape();
  if(inserting||!heldTape)return;
  inserting=true;insertT=0;
  insertVis=buildVHSTape(heldTape.userData.caseCol,heldTape.userData.labelCol,heldTape.userData.stripeCol);
  const fwd=new THREE.Vector3(0,0,-1).applyEuler(new THREE.Euler(0,yaw,0));
  iStart.copy(camera.position).addScaledVector(fwd,.55);iStart.y=camera.position.y-.38;
  iEnd.set(tvStation.position.x+.09, tvStation.position.y+.68+.019+.125+.048, tvStation.position.z+.416);
  insertVis.position.copy(iStart);
  insertVis.rotation.set(Math.PI/2,0,yaw);
  scene.add(insertVis);
}

function tickInsert(dt){
  if(!inserting)return;
  insertT=Math.min(1,insertT+dt*.65);
  const e=insertT<.5?2*insertT*insertT:1-Math.pow(-2*insertT+2,2)/2;
  insertVis.position.lerpVectors(iStart,iEnd,e);
  // rotate from held orientation to horizontal slot
  insertVis.rotation.x=(Math.PI/2)*(1-e);
  insertVis.rotation.z=yaw*(1-e);
  if(insertT>=1){scene.remove(insertVis);insertVis=null;inserting=false;finishInsert();}
}

function finishInsert(){
  const heldTape=getHeldTape();
  if(!heldTape)return;
  tapeInserted=true;
  const vi=heldTape.userData.vidIdx??0;
  activeVidIdx=vi;
  activeVid=TAPE_VIDS[vi]||null;

  const td=buildVHSTape(heldTape.userData.caseCol,heldTape.userData.labelCol,heldTape.userData.stripeCol);
  td.scale.set(.88,.88,.88);td.position.set(.09,.047,.345);td.rotation.x=Math.PI/2;
  td.userData.isInDeck=true;
  vhsGroup.add(td);

  vhsGroup.userData.deckTapeData={
    caseCol:heldTape.userData.caseCol,labelCol:heldTape.userData.labelCol,
    stripeCol:heldTape.userData.stripeCol,name:heldTape.userData.name,vidIdx:vi
  };
  // clear active slot
  inv[activeSlotIdx]=null;
  animSlot(activeSlotIdx);
  updateInvUI();
  clearHighlight();

  if(!tvPowered)tvOn();
  else if(activeVid){
    activeVid.muted=false;
    activeVid.play().catch(()=>{activeVid.muted=true;activeVid.play().catch(()=>{});});
  }
  notif2('TAPE INSERTED — PLAYING');
}

function tickEject(dt){
  if(!ejecting)return;
  ejectT=Math.min(1,ejectT+dt*.55);
  const e=ejectT<.5?2*ejectT*ejectT:1-Math.pow(-2*ejectT+2,2)/2;
  ejectVis.position.lerpVectors(eStart,eEnd,e);
  ejectVis.rotation.x=Math.PI/2*(1-e);
  if(ejectT>=1){
    ejecting=false;tapeInserted=false;
    scene.remove(ejectVis);
    const d=ejectVis.userData;
    const newTape=buildVHSTape(d.caseCol||0x111111,d.labelCol||0xeeeedd,d.stripeCol||0x223388);
    newTape.userData={
      name:d.name||'TAPE',
      caseCol:d.caseCol||0x111111,labelCol:d.labelCol||0xeeeedd,stripeCol:d.stripeCol||0x223388,
      pickedUp:true,vidIdx:d.vidIdx??0
    };
    const empty=invFindEmpty();
    const targetSlot=empty>=0?empty:activeSlotIdx;
    inv[targetSlot]=newTape;
    activeSlotIdx=targetSlot;
    animSlot(targetSlot);
    updateInvUI();
    ejectVis=null;
    vhsGroup.userData.deckTapeData=null;

/* MOVEMENT */
const SPEED=3.5,SPRINT=6.0,clock=new THREE.Clock();
const PLAYER_R=0.35; // player collision radius

function resolveColliders(pos){
  COLLIDERS.forEach(({minX,maxX,minZ,maxZ})=>{
    // expand box by player radius
    const eMinX=minX-PLAYER_R, eMaxX=maxX+PLAYER_R;
    const eMinZ=minZ-PLAYER_R, eMaxZ=maxZ+PLAYER_R;
    if(pos.x>eMinX&&pos.x<eMaxX&&pos.z>eMinZ&&pos.z<eMaxZ){
      // find smallest penetration axis and push out
      const dLeft =pos.x-eMinX, dRight=eMaxX-pos.x;
      const dFront=pos.z-eMinZ, dBack =eMaxZ-pos.z;
      const minD=Math.min(dLeft,dRight,dFront,dBack);
      if(minD===dLeft)  pos.x=eMinX;
      else if(minD===dRight) pos.x=eMaxX;
      else if(minD===dFront) pos.z=eMinZ;
      else                   pos.z=eMaxZ;
    }
  });
}

function move(dt){
  if(inserting||ejecting)return;
  const spd=keys['ShiftLeft']?SPRINT:SPEED;
  const d=new THREE.Vector3();
  if(keys['KeyW']||keys['ArrowUp'])d.z-=1;if(keys['KeyS']||keys['ArrowDown'])d.z+=1;
  if(keys['KeyA']||keys['ArrowLeft'])d.x-=1;if(keys['KeyD']||keys['ArrowRight'])d.x+=1;
  if(d.length()>0){d.normalize();d.applyEuler(new THREE.Euler(0,yaw,0));camera.position.addScaledVector(d,spd*dt);}
  const mg=.4;
  camera.position.x=Math.max(-RW/2+mg,Math.min(RW/2-mg,camera.position.x));
  camera.position.z=Math.max(-RD/2+mg,Math.min(RD/2-mg,camera.position.z));
  resolveColliders(camera.position);
  camera.position.y=1.7;camera.rotation.order='YXZ';camera.rotation.y=yaw;camera.rotation.x=pitch;
}

(function buildDust(){
  // Circular soft sprite texture — radial gradient white→transparent
  const dc=document.createElement('canvas');dc.width=dc.height=32;
  const dctx=dc.getContext('2d');

  dg.addColorStop(0.4,'rgba(220,215,160,0.6)');
  dg.addColorStop(1,'rgba(0,0,0,0)');
  dctx.fillStyle=dg;dctx.fillRect(0,0,32,32);
  const dustTex=new THREE.CanvasTexture(dc);

  const COUNT=320;
  const positions=new Float32Array(COUNT*3);
  const geo=new THREE.BufferGeometry();
  for(let i=0;i<COUNT;i++){
    positions[i*3  ]=(Math.random()-0.5)*size*0.88;
    positions[i*3+1]=Math.random()*height*0.9;
    positions[i*3+2]=(Math.random()-0.5)*size*0.88;
  }
  geo.setAttribute('position',new THREE.BufferAttribute(positions,3));
  const mat=new THREE.PointsMaterial({
    map:dustTex,

    opacity:0.18,
    depthWrite:false,
    sizeAttenuation:true,
    alphaTest:0.01,  // discard fully transparent corners — no square bleeding
  });
  const dust=new THREE.Points(geo,mat);
  dust.userData.vel=[];
  for(let i=0;i<COUNT;i++){
    dust.userData.vel.push(
      (Math.random()-0.5)*0.008,
      (Math.random()-0.5)*0.004,
      (Math.random()-0.5)*0.008
    );
  }
  scene.add(dust);
  dust.userData.tick=function(dt){
    const pos=dust.geometry.attributes.position;
    const vel=dust.userData.vel;
    for(let i=0;i<COUNT;i++){
      let x=pos.getX(i)+vel[i*3]*dt*18;
      let y=pos.getY(i)+vel[i*3+1]*dt*18;
      let z=pos.getZ(i)+vel[i*3+2]*dt*18;
      if(x> size/2) x=-size/2; if(x<-size/2) x=size/2;
      if(y>height)  y=0.1;      if(y<0)       y=height;
      if(z> size/2) z=-size/2; if(z<-size/2) z=size/2;
      pos.setXYZ(i,x,y,z);
    }
    pos.needsUpdate=true;
    mat.opacity=0.12+0.06*Math.sin(Date.now()*0.0004);
  };
  window._dustTick=dust.userData.tick;
})();

/* LOOP */
// Horror flicker state
let flickerCooldown=0, flickerActive=false, flickerIntensity=0.9;
function loop(){
  requestAnimationFrame(loop);
  const dt=clock.getDelta(),t=clock.getElapsedTime();
  move(dt);checkInteract();tickInsert(dt);tickEject(dt);
  updateHighlight(t);
  tickCables();
  if(window._dustTick) window._dustTick(dt);

  // Horror flicker — rare deep dips with hum, occasional long drop
  flickerCooldown-=dt;
  if(flickerCooldown<=0){
    const r=Math.random();
    if(r>0.97){
      // deep flicker event
      flickerActive=true;
      flickerIntensity=0.1+Math.random()*0.3;
      flickerCooldown=0.04+Math.random()*0.12;
    } else if(r>0.93){
      // brief dim
      flickerIntensity=0.6+Math.random()*0.2;
      flickerCooldown=0.02+Math.random()*0.06;
    } else {
      // normal hum — slow sine variation
      flickerActive=false;
      flickerCooldown=0.08;
    }
  }
  if(!flickerActive){
    // low hum: very slow sine, keeps light feeling slightly alive
    flickerIntensity=0.82+Math.sin(t*1.3)*0.06+Math.sin(t*3.7)*0.02;
  }
  lightObjs.forEach(pl=>{ pl.intensity=flickerIntensity; });

  // Sync halo opacity with flicker intensity
  haloMeshes.forEach(({mesh,baseMat,baseOpacity})=>{
    baseMat.opacity=baseOpacity*flickerIntensity;
  });
  lampCoreMat.color.setScalar(Math.min(1,flickerIntensity));

  if(tvPowered){
    paintFrame();cTex.needsUpdate=true;crtMat.uniforms.time.value=t;
    if(warmupP<1){
      warmupT+=dt;warmupP=Math.min(1,warmupT/WARMUP);
      const e=warmupP<.5?4*warmupP**3:1-Math.pow(-2*warmupP+2,3)/2;
      crtMat.uniforms.warmup.value=e;glowMat.opacity=e*.085;tvGlow.intensity=e*2.5;
      if(tvLedMat){tvLedMat.emissive.setHex(0x00ff55);tvLedMat.emissiveIntensity=e*2.5;}
    } else {
      const fl=1+Math.sin(t*52)*.007+Math.sin(t*19)*.004;
      crtMat.uniforms.warmup.value=fl;glowMat.opacity=.085+Math.sin(t*2.9)*.009;tvGlow.intensity=2.5+Math.sin(t*1.8)*.11;
      if(tvLedMat){tvLedMat.emissiveIntensity=2.5;}
    }
  }else{crtMat.uniforms.time.value=t;}
  renderer.render(scene,camera);
  paintBloom();
}
loop();
window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
</script>
